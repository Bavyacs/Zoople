<!DOCTYPE html>
<html>
    <head>
        <title>bounce animation</title>

        <style>
            body{
                background-color: bisque;
            }

            @keyframes bounce{
                0%{
                    transform: translate(0,0);
                }

                50%{
                    transform: translate(0,100px);
                }

                100%{
                    transform: translate(0,0);
                }
            }

            div{
                width:fit-content;
                height: fit-content;
                background-color: chocolate;
                color: whitesmoke;
                animation: bounce 5s linear infinite;

            }
        </style>

    </head>

    <body>
        <h1>Bounce Animation</h1>
        <div>Hello</div>
    </body>
</html>
