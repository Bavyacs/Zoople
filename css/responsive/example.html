<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Responsive Page with Media Queries </title>


        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                background-color: aliceblue;
                padding: 0;
                margin: 0;
                box-sizing: border-box;


            }
            h1{
                text-align: center;
                padding: 10px;
                color: #231164;
                background-color: rgb(219, 124, 124);
                

            }

            .responsive{
                display: flex;
                justify-content: center;
                gap: 20px;
                text-align: center;
            }

            .card{
                border: 2px solid;
                border-radius: 10px;
                background-color: aqua;
                padding: 50px;

            }
            
            footer{
                text-align: center;
                background-color: #6448cb;
                margin-top: 40px;
                padding:1px;
            }

            @media(max-width:600px){
                body{
                    background-color: white;
                    

                }

                h1{
                   
                   text-align: center;
                   padding: 10px;
                   color: #e9e7f0;
                   background-color: rgb(126, 8, 8);
                }

                .responsive{
                    width:90%;
                    max-width:900px;
                    margin:30px auto;

                    display:flex;
                    justify-content: center;
                    text-align: center;
                    flex-direction:column;
                    gap:25px;
                }

                 .card{
                    flex: 1;
                    border: 2px solid;
                    border-radius: 10px;
                    background-color: rgb(211, 142, 134);
                    padding: 30px;

                }
                h2{
                    color: #231164;
                }
                footer{
                    text-align: center;
                    background-color: #6448cb;
                    margin-top: 40px;
                    padding:1px;
            }

            }
        </style>
    </head>

    <body>
        <h1>Responsive Website Eample</h1>
        <div class="responsive">
        
        <div class="card">
            <h2>HTML</h2>
            <p>Structure your webpage using HTML elements.</p>
        </div>

        <div class="card">
            <h2>CSS</h2>
            <p>
                Style your webpage with colors,layout,and fonts.
            </p>
        </div>

        <div class="card">
            <h2>JavaScript</h2>
            <p>Add interactivity and logic to your website.</p>
        </div>

       </div>

        <footer>
        <p>&copy;2025 Learn Web Development</p>
    </footer>

    
    </body>

</html>
