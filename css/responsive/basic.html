<!DOCTYPE html>
<html>
    <head>
        <meta name="viewpoint" content="width=device-width,initial-scale=1.0">
        <title>responsive basic</title>
    
    <style>
        body{
            background-color: aqua;
        }
        h1{
            color: #0f7323;
        }
        p{
            color: #41cd74;
        }

        @media(max-width:500px){
            body{
                background-color: blanchedalmond;
            }
            h1{
                color: brown;
            }
            p{
                color: #bb4b4b;
            }
        @media(max-width:300px){
            body{
                background-color: rgb(160, 207, 208);
            }
            h1{
                color: #0e0c5a;
            }
            p{
                color: #515aab;
            }
        }
        }
    </style>
    </head>

    <body>
        <h1>Hi lm currently red</h1>
        <p>this is a paragraph</p>
        
    </body>
</html>
