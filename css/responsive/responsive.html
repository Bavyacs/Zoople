<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>responsive navbar</title>
    </head>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: aliceblue;
        }

        .main{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(35, 58, 122);
            color: white;
            padding: 10px;

        }

        .links{
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .links a{
            text-decoration: none;
            color: white;

        }

        .content{
            text-align: center;
            margin-top: 50px;
        }

        .content h1{
            font-size: 60px;
            color: rgb(62, 5, 115);
        }

        .content p{
            margin-top: 20px;
        }


        @media(max-width:600px){
            .main{
                display: flex;
                justify-content: space-between;

            }

            .links{
                flex-direction: column;

            }
            .content h1{
                font-size: 30px;
            }

            .content p{
                font-size: 15px;
            }
        }

    </style>

    <body>
        <nav class="main">
            <div class="logo">MyWebsite</div>

            <ul class="links">
              <li><a href="/home">Home</a></li>
              <li><a href="/about">About</a></li>
              <li><a href="/services">Sevices</a></li>
              <li><a href="/contact">Contact</a></li>
            </ul>
              </div>
        </nav>

        <div class="content">
            <h1>Welcome to My Responsive Navbar</h1>
            <p>Resize the browser window to see the navigation change layout!</p>
        </div>
    </body>
</html>
