<!DOCTYPE html>
<html>
    <head>
        <title>CSS Styling Methods</title>
        <link rel="stylesheet" href="basic.css">

        <style>
            body{
                background-color: aquamarine;
            }
            h1 {
                color: #150959;
                text-align: center;
                background-color: rgb(56, 147, 221);
                padding: 20px;
            }
        </style>
    </head>

    <body>
        <h1><u>CSS styling Methods</u></h1>

        <p style="color: #db1d20; text-align: center; font-size: 20px;">
            This paragraph is styled using <strong>Inline CSS </strong></p>

        <h2>This heading is styled using Internal CSS</h2>

        <h3 style="color: #295a0e; text-align: center;">External CSS Example for body element</h3>

        <h4 style="text-align: center;">change my color</h4>
    </body>
</html>
