<!DOCTYPE html>
<html>
    <head>
        <title>personal information</title>
        <link rel="stylesheet" href="act2 style.css">
    </head>

    <body>
        <div class="formbox">
           <h2>Personal Information</h2>

           <form>

            <label for="name">Full Name</label><br> 
            <input type="text" id="name" name="fname" placeholder="Enter full name" required><br><br>
        
            <label for="email">Email</label><br>
            <input type="text" id="email" name="email" placeholder="example@gmail.com" required><br><br>

            <label for="age">Age</label><br>
            <input type="text" id="age" name="age"><br><br>

            <label for="dob">Date of Birth</label><br>
            <input type="date" id="dob" name="dob"><br><br>

            <p><strong>Gender</strong></p>
            <input type="radio" id="gender" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="gender" name="gender" value="female">
            <label for="female">Female</label> <br>

            <p><strong>Language Known</strong></p>
            <input type="checkbox" id="lang" name="lang" value="eng">
            <label for="eng">English</label>
            <input type="checkbox" id="lang" name="lang" value="tamil">
            <label for="tamil">Tamil</label>
            <input type="checkbox" id="lang" name="lang" value="hindi">
            <label for="hindi">Hindi</label><br><br>

            <label for="file">Upload Resume</label><br>
            <input type="file" id="file" nmae="file"><br><br>

            <button type="submit">Submit Form</button>

        </form>
        </div>
    </body>
</html>
