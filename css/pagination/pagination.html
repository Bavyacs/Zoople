<!DOCTYPE html>
<html>
    <head>
        <title>pagination</title>
        <style>
            .pagination ul {
                    display: flex;
                    justify-content: center;
                    list-style: none; /* remove list bullets */
                    padding: 0px;
                    text-decoration: none;

            }
            h1{
                text-align: center;
                color: #761818;
            }

            .pagination li a {
                display: block; /* let links fill the list item */
                padding: 8px 12px;
                list-style: none; 
                text-decoration: none;
                border: 1px solid gray;
                color: black;
                margin: 0 4px;
                border-radius: 5px; /* add rounded borders */
           
} 
        </style>
    </head>

    <body>
        <h1>Pagination</h1>

        <div class="pagination">
            <ul>
                
                <li><a href="#">&laquo;</a> </li>        <!-- Previous -->
                <li><a href="#" class="active">1</a></li>
                <li><a href="#">2</a></li>
                <li><a href="#">3</a></li>
                <li><a href="#">4</a></li>
                <li><a href="#">5</a></li>
                <li><a href="#">&raquo;</a> </li>        <!-- Next -->
            </ul>

         </div>

    </body>
</html>
