<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Product Cards</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>

<h1>Product Card</h1>

<div class="products">

    <div class="card">
        <img src="https://cdn.mos.cms.futurecdn.net/j6ndSR6hKav95QT83beRB4.jpg" alt="">
        <h3>Laptop</h3>
        <p class="price">1,31,899</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://easy-peasy.ai/cdn-cgi/image/quality=70,format=auto,width=500/https://media.easy-peasy.ai/3be493d4-e1b6-40a2-9f0c-bee6278d14ec/ce2b5539-6ff1-49e5-9334-149e6ad82631.png" alt="">
        <h3>Smartphone</h3>
        <p class="price">19,699</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://img.freepik.com/premium-photo/picture-headphones_931878-356408.jpg" alt="">
        <h3>Headphones</h3>
        <p class="price">6890</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://static.vecteezy.com/system/resources/previews/050/177/034/non_2x/smart-watch-isolated-on-transparent-background-png.png" alt="">
        <h3>Smart Watch</h3>
        <p class="price">2149</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://tse4.mm.bing.net/th/id/OIP.S3NmvzJ0AgRD-HVWEh0TtQHaE8?rs=1&pid=ImgDetMain&o=7&rm=3" alt="">
        <h3>Camera</h3>
        <p class="price">1,41,599</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://i.gadgets360cdn.com/large/lenovo_tab_p12_1734925086669.jpg" alt="">
        <h3>Tablet</h3>
        <p class="price">8399</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://i5.walmartimages.com/asr/4ed7293b-440b-4c69-9662-d3cbc0ace678_1.b61eb782676c8bf47963adf5c15bffc9.jpeg" alt="">
        <h3>Speaker</h3>
        <p class="price">8079</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://alexnld.com/wp-content/uploads/2020/12/c2a4c605-8d39-4e36-9cbb-0ea28e0f60c4.jpg" alt="">
        <h3>Gaming Mouse</h3>
        <p class="price">2649</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
