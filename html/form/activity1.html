<!DOCTYPE html>
<html>
    <head>
        <title>form design</title>
    </head>

    <body>
        <h1>Contact Us Form</h1>

        <form >
            <fieldset>
            <legend><strong>📞Contact Us</strong></legend><br>

            <label for="name">Full Name:</label><br>
            <input type="text" id="fname" name="fname" placeholder="Enter your name" required><br><br>

            <label for="email">Email:</label><br>
            <input type="text" id="email" name="email" placeholder="your@gmail.com" required><br><br>

            <label for="password">Password(for registered users):</label><br>
            <input type="text" id="password" name="password" placeholder="Enter your password"><br><br>

            <label for="phone no">Phone Number:</label><br>
            <input type="text" id="phoneno" name="phoneno" placeholder="Enter your phone number" required><br><br>

            <label for="contact date">Preferred Contact Date:</label><br>
            <input type="date" id="date" name="date"> <br><br>

            <p>How did you hear about us?</p>
            <input type="radio" id="radio" name="radio" value="Social Media">
            <label for="social media">Social Media</label><br>

            <input type="radio" id="radio" name="radio" value="Friend">
            <label for="Friend">Friend</label><br>

            <input type="radio" id="radio" name="radio" value="advertisment">
            <label for="advertisement">Advertisement</label><br>

            <p>Topic your intrested in:</p>
            <input type="checkbox" id="checkbox" name="checkbox" value="UI/UX Designing With AI">
            <label for="UI/UX Designing With AI">UI/UX Designing With AI</label><br>

            <input type="checkbox" id="checkbox" name="checkbox" value="Full-Stack Digital Marketing With AI">
            <label for="Full-Stack Digital Marketing With AI">Full-Stack Digital Marketing With AI</label><br>

            <input type="checkbox" id="checkbox" name="checkbox" value="MERN Full-Stack Development With AI">
            <label for="MERN Full-Stack Development With AI">MERN Full-Stack Development With AI</label><br>

            <input type="checkbox" id="checkbox" name="checkbox" value="Data Science, AI, ML & Gen AI">
            <label for="Data Science, AI, ML & Gen AI">Data Science, AI, ML & Gen AI</label><br><br>

            <input type="submit" value="Submit">

          </fieldset>
        
        </form>
    </body>
</html>
