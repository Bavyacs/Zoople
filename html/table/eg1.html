<!DOCTYPE html>
<html>
    <head>
        <title>lists and tables</title>
    </head>
    <body>
        <h2>To-do list</h2>
        <ul>
            <li>monday</li>
            <ol>
                <li>Math</li>
                <li>english</li>
            </ol>
            <li>Thuesday</li>
            <ol>
                <li>Geography</li>
                <li>History</li>
            </ol>
        </ul>
        <h2>Schedule Table</h2>
        <table border="1" cellspacing="2" cellpadding="8">
        <caption>Weekly Routine</caption>
        <tr>
            <th>Day</th>
            <th>Moring</th>
            <th>Afternoon</th>
            <th>Evening</th>
        </tr>
        <tr>
            <td rowspan="2">monday& tuesday</td>
            <td><a href="https://www.curriculumassociates.com">Math</a></td>
            <td>english</td>
            <td>basketball</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>Art</td>
            <td>music</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td colspan="2">Project work(morning+afternoon)</td>
            <td>dance</td>
        </tr>
        </table>
       </body>
</html>
