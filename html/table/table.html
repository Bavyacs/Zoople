<!DOCTYPE html>
<html>
    <head>
        <title>tables</title>
    </head>
    <body>
        <h1>Table example:Favorite books</h1>
        <table border="1" cellspacing="2" cellpadding="8">
           <caption>My Favorite Books</caption>
           <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Year</th>
           </tr>
           <tr>
            <td>The Alchemist</td>
            <td>Paulo coelho</td>
            <td>1988</td>
           </tr>
           <tr>
            <td>1984</td>
            <td>George orwell</td>
            <td>1949</td>
           </tr>
           <tr>
            <td>Harry potter series</td>
            <td>J.K rowling</td>
            <td>1997-2007</td>
           </tr>
        </table>
    </body>
</html>
