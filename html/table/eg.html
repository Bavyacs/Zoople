<!DOCTYPE html>
<html>
    <head>
        <title>tables</title>
    </head>
    <body>
        <h1>Table rowspan</h1>
        <table border="1" cellspacing="2" cellpadding="8">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Ajay</td>
            <td rowspan="2">24</td>

        </tr>
        <tr>
            <td>Priya</td>
        </tr>
        </table>
        <h1>Table with colspan</h1>
        <table border="1" cellpsacing="2" cellpadding="8">
            <tr>
                <th>Name</th>
                <th>Expense</th>
            </tr>
            <tr>
                <td>Arun</td>
                <td>$10</td>
            </tr>
            <tr>
                <td>Priya</td>
                <td>$8</td>
            </tr>
            <tr>
                <td colspan="2">sum:$18</td>
            </tr>
        </table>
    </body>
</html>
